# aws-load-balancer-controller
#
# Deploy with:
#   helm upgrade --install aws-load-balancer-controller \
#     eks/aws-load-balancer-controller \
#     -n kube-system --version 1.14.0 \
#     -f deploy/ingress-controller/values.yaml \
#     --set clusterName=$CLUSTER_NAME \
#     --set region=$AWS_REGION \
#     --set vpcId=$VPC_ID \
#     --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$ROLE_ARN
#
# clusterName / region / vpcId / role ARN are passed at install time from the
# deploy workflow so the same file works for any cluster.

# IRSA. The `eks.amazonaws.com/role-arn` annotation is injected at install
# time from the alb_controller_role_arn TF output via --set — see the deploy
# workflow and `make deploy-local`. Don't hardcode it here; it's
# account-scoped.
serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations: {}

# Two replicas spread the leader-election load and survive a node roll.
replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Default ingressClass (`alb`) is what our microservice Ingress targets.
# Leaving createIngressClassResource=true lets the chart own the IngressClass.
ingressClass: alb
createIngressClassResource: true

# Restricted Pod Security Standard.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop: ["ALL"]
